name: Build e publicação na branch deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Rebuild diario so para atualizar a secao de Noticias: o coletor roda como
  # etapa do build, entao o site continua sendo apenas arquivos estaticos --
  # sem servidor, sem CORS e sem chave de API.
  schedule:
    - cron: "0 9 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Coletar notícias (leis, decretos e avanços para as mulheres)
        # Se uma fonte estiver fora do ar, seguimos com o public/noticias.json
        # versionado no repositorio em vez de derrubar o deploy inteiro.
        run: node scripts/coletar-noticias.mjs || echo "coleta falhou; mantendo o arquivo anterior"

      - name: Gerar build de produção
        run: npm run build
        env:
          VITE_BASE44_APP_ID: 6a0cbe38006b2f3439037e1d
          VITE_BASE44_APP_BASE_URL: https://omniscient-escuta-segura-rede.base44.app

      - name: Versionar o service worker com o SHA do commit
        # sw.js nao tem hash no nome. Sem isso ele fica byte-identico entre
        # deploys, o navegador nunca reinstala o worker e o cache antigo do app
        # nunca e limpado.
        run: |
          sed -i "s/__BUILD__/${GITHUB_SHA::12}/" dist/sw.js
          grep -n "const VERSAO" dist/sw.js

      - name: Publicar build na branch deploy
        run: |
          cp scripts/server-deploy.sh dist/
          cd dist
          git init -b deploy
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Build de $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" deploy
